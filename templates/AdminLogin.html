{% extends 'base.html' %}
{% load static %}
{% block contents %}

<div class="card-glass" style="max-width: 450px; margin: 2rem auto; animation: fadeUp 0.6s ease-out;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <i class="fa-solid fa-shield-halved" style="font-size: 2.5rem; color: #f59e0b; margin-bottom: 1rem;"></i>
        <h2 style="margin:0; font-size: 1.5rem; letter-spacing: -0.01em;">Administrative Center</h2>
        <p style="color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;">High-level system management access</p>
    </div>

    <form action="{% url 'AdminLoginCheck' %}" method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 1.25rem;">
            <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">root ID</label>
            <div style="position: relative;">
                <i class="fa-solid fa-robot" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                <input type="text" name="loginid" required style="padding-left: 45px; margin:0;" placeholder="admin_user">
            </div>
        </div>

        <div style="margin-bottom: 2rem;">
            <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">Admin Passphrase</label>
            <div style="position: relative;">
                <i class="fa-solid fa-lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                <input type="password" name="pswd" required style="padding-left: 45px; margin:0;" placeholder="••••••••">
            </div>
        </div>

        <button type="submit" class="btn-premium" style="width: 100%; background: #f59e0b; justify-content: center; display: flex;">
            Authorize Access
        </button>

        {% if messages %}
            <div style="margin-top: 1.5rem;">
                {% for message in messages %}
                    <div class="glass-panel" style="padding: 12px; font-size: 0.875rem; color: #ef4444; border-color: rgba(239, 68, 68, 0.2); text-align: center; background: rgba(239, 68, 68, 0.05);">
                        <i class="fa-solid fa-circle-xmark"></i> {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    </form>
</div>

<style>
    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
